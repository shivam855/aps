# =============================================
# Automation Framework Configuration
# =============================================

# Browser: chrome | firefox | edge
browser=chrome

# Application URL (used when use.mock.page=false; flight tests use flights.url in test code)
base.url=https://www.ixigo.com/


# Live ixigo login — OTP must be entered manually in the browser during this wait (seconds)
ixigo.otp.wait.seconds=180
# Set true only if you are already logged in to ixigo in the same browser profile
ixigo.skip.login=false

# Mock API removed

# Logging: INFO | DEBUG
log.level=DEBUG

# Timeouts (in seconds)
implicit.wait=20
explicit.wait=60
page.load.timeout=30

# Test Data
test.data.path=src/test/resources/TestData.xlsx

# Screenshot on failure
screenshot.on.failure=true
screenshot.path=reports/screenshots/

# Reports
report.path=reports/ExtentReport.html
