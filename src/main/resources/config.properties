# =============================================
# Automation Framework Configuration
# =============================================

# Browser: chrome | firefox | edge
browser=chrome

# Application URL (used when use.mock.page=false; flight tests use flights.url in test code)
base.url=https://www.expedia.com/
# Week 3 — flight booking flow (live)

# Ixigo train search test data (Playwright flow)
ixigo.origin.query=New delhi
ixigo.origin.station=New Delhi (NDLS)
ixigo.destination.query=kanpur
ixigo.destination.station=Kanpur Central
ixigo.journey.day=skip
ixigo.journey.date=skip
ixigo.journey.quick=skip
ixigo.results.heading=Delhi to Kanpur Trains

# Mock mode removed — tests use live UI by default

# Live ixigo login — OTP must be entered manually in the browser during this wait (seconds)
ixigo.otp.wait.seconds=90
# Set true only if you are already logged in to ixigo in the same browser profile
ixigo.skip.login=false

# Mock API removed

# Logging: INFO | DEBUG
log.level=DEBUG

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Test Data
test.data.path=src/test/resources/TestData.xlsx

# Screenshot on failure
screenshot.on.failure=true
screenshot.path=reports/screenshots/

# Reports
report.path=reports/ExtentReport.html
