<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ixigo Trains - Mock Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 40px; }
        .card { max-width: 520px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h1 { font-size: 1.4rem; margin-top: 0; color: #1e3a8a; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 16px; width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #94a3b8; }
        .error-message { display: none; color: #b91c1c; margin-top: 12px; }
        .api-status { font-size: 0.85rem; color: #64748b; margin-top: 8px; }
        #dashboard { display: none; }
        .train-card { border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; margin-top: 10px; background: #f8fafc; }
        .train-card h3 { margin: 0 0 6px; font-size: 1rem; }
        .train-meta { font-size: 0.9rem; color: #475569; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loginForm">
            <h1>Ixigo Trains — Mock Login</h1>
            <p class="api-status">Login uses <strong>mock API</strong> (not the real ixigo server)</p>
            <label for="username">Email / Username</label>
            <input type="text" id="username" placeholder="admin@example.com">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Admin@123">

            <button id="loginBtn" type="button">Login</button>
            <div class="error-message" id="error-message">Invalid username or password.</div>
        </div>

        <div id="dashboard">
            <h1>Train Search Dashboard</h1>
            <p id="welcomeMessage">Loading dashboard...</p>
            <p id="searchSummary"></p>
            <div id="trainResults"></div>
        </div>
    </div>

    <script>
        // Must match mock.api.port in config.properties
        var MOCK_API_BASE = 'http://127.0.0.1:9090';

        document.getElementById('loginBtn').addEventListener('click', doLogin);

        async function doLogin() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var error = document.getElementById('error-message');
            var loginBtn = document.getElementById('loginBtn');

            error.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                // Mock login API — real ixigo login is NOT called
                var loginResponse = await fetch(MOCK_API_BASE + '/mock/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ApiKey': 'ixiweb!2$',
                        'ClientId': 'ixiweb'
                    },
                    body: JSON.stringify({ email: username, username: username, password: password })
                });

                var loginData = await loginResponse.json();
                console.log('[MockAPI] login response', loginData);

                if (!loginResponse.ok || !loginData.success) {
                    error.style.display = 'block';
                    return;
                }

                sessionStorage.setItem('mockToken', loginData.data.token);
                await showDashboard(loginData.data.token);
                window.location.hash = 'dashboard';
            } catch (err) {
                console.error('[MockAPI] login failed', err);
                error.textContent = 'Mock API unavailable. Start tests with mock.api.enabled=true';
                error.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        }

        async function showDashboard(token) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // Mock dashboard API
            var dashResponse = await fetch(MOCK_API_BASE + '/mock/api/v1/dashboard', {
                headers: { 'Authorization': 'Bearer ' + token, 'ApiKey': 'ixiweb!2$' }
            });
            var dashData = await dashResponse.json();
            document.getElementById('welcomeMessage').textContent = dashData.data.welcomeMessage;

            // Mock train search API (same endpoint shape as ixigo/confirmtkt)
            var searchUrl = MOCK_API_BASE + '/mock/api/v1/trains/search'
                + '?sourceStationCode=NDLS'
                + '&destinationStationCode=LTT'
                + '&dateOfJourney=02-06-2026'
                + '&addAvailabilityCache=true'
                + '&sortBy=DEFAULT';

            var searchResponse = await fetch(searchUrl, {
                headers: {
                    'Accept': '*/*',
                    'ApiKey': 'ixiweb!2$',
                    'ClientId': 'ixiweb',
                    'Content-Type': 'application/json'
                }
            });
            var searchData = await searchResponse.json();
            console.log('[MockAPI] train search response', searchData);

            var trains = searchData.data.trains;
            document.getElementById('searchSummary').textContent =
                searchData.data.sourceStationName + ' → ' + searchData.data.destinationStationName
                + ' | ' + searchData.data.dateOfJourney + ' | ' + trains.length + ' trains found';

            var html = '';
            trains.forEach(function(train) {
                html += '<div class="train-card" data-train-number="' + train.trainNumber + '">'
                    + '<h3>' + train.trainNumber + ' — ' + train.trainName + '</h3>'
                    + '<div class="train-meta">'
                    + train.departureTime + ' → ' + train.arrivalTime + ' (' + train.duration + ')'
                    + ' <span class="badge">' + train.availability + '</span>'
                    + '</div></div>';
            });
            document.getElementById('trainResults').innerHTML = html;
        }
    </script>
</body>
</html>
